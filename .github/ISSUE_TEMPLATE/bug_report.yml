name: 🐛 Bug report
description: Something in vue-gantt doesn't work as documented
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! A minimal reproduction is the fastest way to a fix
        (a StackBlitz/CodeSandbox, a small repo, or a failing case in `bun run storybook`).
  - type: input
    id: version
    attributes:
      label: vue-gantt version
      placeholder: e.g. 1.9.0
    validations:
      required: true
  - type: input
    id: vue-version
    attributes:
      label: Vue version
      placeholder: e.g. 3.5.13
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect to happen, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Steps to reproduce, or a minimal repro (StackBlitz / CodeSandbox / repo).
      placeholder: |
        1. Render `<Gantt :rows="…" draggable />`
        2. Drag a bar …
        3. …
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: browser + OS, e.g. Chrome 120 / macOS 14
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, console errors, related props/slots.
