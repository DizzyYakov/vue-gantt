name: Release

# Automatic versioning + npm publish.
#
# release-please reads the Conventional Commits merged into `main` and keeps a
# "release PR" open that bumps the version (release-please-config.json /
# .release-please-manifest.json) and updates the changelog. Merging that PR cuts
# a GitHub Release + tag; the `publish` job then publishes the package to npm.
#
# Retrying a failed release: if the `publish` job fails (e.g. an expired npm
# token), rotate the token first (repo Settings → Secrets → NPM_TOKEN), then
# Actions → Release → "Run workflow" to re-publish — optionally pass the tag as
# `ref` (default: `main`, i.e. the current version). Publishing is idempotent: it
# skips a version that is already on npm, so re-runs never fail with a 403.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag/branch to (re)publish, e.g. vue-gantt-v1.3.0. Default: main.'
        required: false

jobs:
  # release-please cuts the version bump + tag + GitHub Release on a push to main.
  release-please:
    name: Release Please
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create tags/releases + the release PR commits
      pull-requests: write # open/update the release PR
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Publish to npm. Runs when release-please cut a release, or on a manual
  # `workflow_dispatch` retry (where release-please is skipped, so `!cancelled()`
  # keeps this job alive). Idempotent, so re-running a failed release is safe.
  publish:
    name: Publish to npm
    needs: [release-please]
    if: >-
      ${{ !cancelled() &&
      (github.event_name == 'workflow_dispatch' ||
      needs.release-please.outputs.release_created == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          # A release publishes the just-cut tag; a manual retry publishes the
          # requested tag; otherwise the default branch (main = current version).
          ref: ${{ github.event.inputs.ref || needs.release-please.outputs.tag_name || '' }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node (npm registry)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unit tests
        run: bunx vitest run

      # `prepack` builds the library (type-check + Vite + .d.ts) before packing.
      # Skip publishing a version that's already on npm so retries are idempotent.
      - name: Publish to npm
        run: |
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "::notice::$NAME@$VERSION is already on npm — nothing to publish."
          else
            echo "Publishing $NAME@$VERSION…"
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
